name: Sync Supabase Data

on:
  workflow_dispatch:

concurrency:
  group: sync-supabase-data
  cancel-in-progress: false

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate latest data SQL
        run: npm run db:sql

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check database secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL secret is missing."
            exit 1
          fi
          echo "Database secret is configured. If the next step fails with Network is unreachable, use the Supabase Pooler connection string."

      - name: Apply data sync SQL
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/latest-data-sync.sql
